<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Marcador Truco</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" href="logo-marcador.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <div id="app-root">
        <section id="setup-screen" class="screen">
            <div class="app-shell">
                <header class="app-header">
                    <img class="brand-logo" src="logo-marcador.svg" alt="">
                    <div>
                        <p class="app-kicker">Marcador</p>
                        <h1 class="app-title">Truco</h1>
                    </div>
                </header>

                <div class="top-section">
                    <div class="segmented-control mode-selector" aria-label="Modo de jogo">
                        <div class="segment-glider" id="mode-glider"></div>
                        <button type="button" class="segment-opt active" onclick="mudarModo('truco', this)">Truco</button>
                        <button type="button" class="segment-opt" onclick="mudarModo('fodinha', this)">Fodinha</button>
                    </div>
                </div>

                <main class="setup-body">
                    <div id="setup-truco" class="game-setup-container">
                        <div class="setup-title-row">
                            <h2>Partida</h2>
                            <span>Duplas</span>
                        </div>

                        <div class="field-stack">
                            <label class="input-group">
                                <span>Nós</span>
                                <input type="text" id="input-time1" placeholder="Nome da dupla" autocomplete="off">
                            </label>
                            <label class="input-group">
                                <span>Eles</span>
                                <input type="text" id="input-time2" placeholder="Nome da dupla" autocomplete="off">
                            </label>
                        </div>

                        <div class="control-section">
                            <label class="section-label">Pontos da partida</label>
                            <div class="segmented-control points-selector" aria-label="Pontos da partida">
                                <div class="segment-glider"></div>
                                <button type="button" class="segment-opt active" onclick="selPonto(12, this)">12</button>
                                <button type="button" class="segment-opt" onclick="selPonto(24, this)">24</button>
                                <button type="button" class="segment-opt" onclick="selPonto(30, this)">30</button>
                            </div>
                            <input type="hidden" id="input-max" value="12">
                        </div>

                        <div class="control-section">
                            <label class="section-label">Tipo de marcador</label>
                            <div class="segmented-control truco-score-mode-selector" aria-label="Tipo de marcador do Truco">
                                <div class="segment-glider"></div>
                                <button type="button" class="segment-opt active" onclick="selTrucoScoreMode('simple', this)">Simples</button>
                                <button type="button" class="segment-opt" onclick="selTrucoScoreMode('complete', this)">Completo</button>
                            </div>
                            <input type="hidden" id="input-truco-score-mode" value="simple">
                        </div>
                    </div>

                    <div id="setup-fodinha" class="game-setup-container hidden">
                        <div class="setup-title-row">
                            <h2>Jogadores</h2>
                            <span>Sobrevivência</span>
                        </div>

                        <div class="life-limit-pill">
                            <label for="input-vidas-max">Limite de vidas</label>
                            <input type="number" id="input-vidas-max" class="pill-input" value="5" min="1" max="99"
                                pattern="\d*" inputmode="numeric">
                        </div>

                        <div class="players-setup-list" id="players-container"></div>

                        <button type="button" class="btn-secondary" onclick="addFodinhaPlayer()">Adicionar jogador</button>
                    </div>
                </main>

                <footer class="footer-action">
                    <button type="button" id="btn-start" class="btn-primary" onclick="iniciarJogo()">Iniciar jogo</button>

                    <div class="action-row">
                        <button type="button" class="btn-secondary" onclick="window.location.href='regras.html'">Regras</button>
                        <button type="button" class="btn-secondary" onclick="abrirHistorico()">Histórico</button>
                    </div>
                </footer>
            </div>
        </section>

        <section id="game-screen-truco" class="screen hidden game-layout">
            <header class="top-bar">
                <button type="button" class="icon-btn" onclick="confirmarSaida()" aria-label="Sair">×</button>
                <div class="match-status">
                    <span>Meta</span>
                    <strong id="display-meta">12</strong>
                </div>
                <div class="top-actions">
                    <button type="button" class="icon-btn" onclick="window.location.href='regras.html'" aria-label="Regras">?</button>
                    <button type="button" class="icon-btn" onclick="desfazerUltimoPonto()" aria-label="Desfazer">↶</button>
                    <button type="button" class="icon-btn" onclick="confirmarZerar()" id="btn-reset" aria-label="Zerar">↻</button>
                </div>
            </header>

            <main id="truco-simple-panel" class="simple-score-layout">
                <section class="placar-container simple">
                    <div class="score-card" id="simple-card-time1" role="button" tabindex="0" onclick="pontuarTap(1)">
                        <div class="score-card-head">
                            <h2 id="simple-nome-time1" class="team-name">NÓS</h2>
                        </div>
                        <output class="score-number" id="simple-score-time1">0</output>
                        <div class="score-actions">
                            <button type="button" class="score-action" onclick="event.stopPropagation(); mudarPontos(1, -1)">−1</button>
                            <button type="button" class="score-action primary" onclick="event.stopPropagation(); mudarPontos(1, 1)">+1</button>
                            <button type="button" class="score-action" onclick="event.stopPropagation(); mudarPontos(1, 3)">+3</button>
                        </div>
                    </div>

                    <div class="score-card" id="simple-card-time2" role="button" tabindex="0" onclick="pontuarTap(2)">
                        <div class="score-card-head">
                            <h2 id="simple-nome-time2" class="team-name">ELES</h2>
                        </div>
                        <output class="score-number" id="simple-score-time2">0</output>
                        <div class="score-actions">
                            <button type="button" class="score-action" onclick="event.stopPropagation(); mudarPontos(2, -1)">−1</button>
                            <button type="button" class="score-action primary" onclick="event.stopPropagation(); mudarPontos(2, 1)">+1</button>
                            <button type="button" class="score-action" onclick="event.stopPropagation(); mudarPontos(2, 3)">+3</button>
                        </div>
                    </div>
                </section>
            </main>

            <main id="truco-complete-panel" class="truco-match hidden">
                <section class="truco-score-panel">
                    <article class="truco-team-card" id="card-time1">
                        <span id="nome-time1" class="team-name">NÓS</span>
                        <output class="team-score" id="score-time1">0</output>
                    </article>
                    <div class="round-badge">
                        <span>Mão</span>
                        <strong id="display-round">1</strong>
                    </div>
                    <article class="truco-team-card" id="card-time2">
                        <span id="nome-time2" class="team-name">ELES</span>
                        <output class="team-score" id="score-time2">0</output>
                    </article>
                </section>

                <section class="truco-panel">
                    <div class="panel-heading">
                        <div>
                            <span class="panel-kicker">Lançar pontos</span>
                            <h2>Origem da pontuação</h2>
                        </div>
                        <button type="button" class="small-action" onclick="novaMaoTruco()">Nova mão</button>
                    </div>

                    <div class="team-picker" aria-label="Dupla que recebe os pontos">
                        <button type="button" id="point-team-1" class="team-pick active" onclick="selecionarTimePontuacao(1, this)">Nós</button>
                        <button type="button" id="point-team-2" class="team-pick" onclick="selecionarTimePontuacao(2, this)">Eles</button>
                    </div>

                    <div class="round-log-compact">
                        <div class="mini-section-title">Mão atual</div>
                        <div id="truco-round-log" class="round-event-list"></div>
                    </div>

                    <div class="score-source-grid">
                        <section class="score-source-section">
                            <h3>Envido</h3>
                            <div class="source-actions">
                                <button type="button" onclick="registrarEventoTruco('envido')"><span>Envido</span><strong>+2</strong></button>
                                <button type="button" onclick="registrarEventoTruco('realEnvido')"><span>Real envido</span><strong>+3</strong></button>
                                <button type="button" onclick="registrarEventoTruco('faltaEnvido')"><span>Falta envido</span><strong id="falta-envido-value">+12</strong></button>
                                <button type="button" onclick="registrarEventoTruco('envidoNaoQuerido')"><span>Não querido</span><strong>+1</strong></button>
                            </div>
                        </section>

                        <section class="score-source-section">
                            <h3>Flor</h3>
                            <div class="source-actions">
                                <button type="button" onclick="registrarEventoTruco('flor')"><span>Flor</span><strong>+3</strong></button>
                                <button type="button" onclick="registrarEventoTruco('contraFlor')"><span>Contra flor</span><strong>+6</strong></button>
                                <button type="button" onclick="registrarEventoTruco('contraFlorResto')"><span>Ao resto</span><strong id="contra-flor-resto-value">+12</strong></button>
                                <button type="button" onclick="registrarEventoTruco('florNaoQuerida')"><span>Não querida</span><strong>+3</strong></button>
                            </div>
                        </section>

                        <section class="score-source-section">
                            <h3>Truco</h3>
                            <div class="source-actions">
                                <button type="button" onclick="registrarEventoTruco('mao')"><span>Mão</span><strong>+1</strong></button>
                                <button type="button" onclick="registrarEventoTruco('truco')"><span>Truco</span><strong>+2</strong></button>
                                <button type="button" onclick="registrarEventoTruco('retruco')"><span>Retruco</span><strong>+3</strong></button>
                                <button type="button" onclick="registrarEventoTruco('valeQuatro')"><span>Vale 4</span><strong>+4</strong></button>
                            </div>
                        </section>

                        <section class="score-source-section">
                            <h3>Corridas e ajuste</h3>
                            <div class="source-actions">
                                <button type="button" onclick="registrarEventoTruco('trucoNaoQuerido')"><span>Truco correu</span><strong>+1</strong></button>
                                <button type="button" onclick="registrarEventoTruco('retrucoNaoQuerido')"><span>Retruco correu</span><strong>+2</strong></button>
                                <button type="button" onclick="registrarEventoTruco('valeQuatroNaoQuerido')"><span>Vale 4 correu</span><strong>+3</strong></button>
                                <button type="button" onclick="registrarEventoTruco('ajusteMenos')"><span>Corrigir</span><strong>−1</strong></button>
                            </div>
                        </section>
                    </div>
                </section>

                <section class="truco-panel">
                    <div class="panel-heading compact">
                        <div>
                            <span class="panel-kicker">Partida</span>
                            <h2>Resumo por origem</h2>
                        </div>
                    </div>
                    <div id="truco-source-summary" class="source-summary"></div>
                </section>
            </main>
        </section>

        <section id="game-screen-fodinha" class="screen hidden game-layout">
            <header class="top-bar">
                <button type="button" class="icon-btn" onclick="confirmarSaida()" aria-label="Sair">×</button>
                <div class="match-status">
                    <span>Limite</span>
                    <strong id="display-fodinha-max">5</strong>
                </div>
                <button type="button" class="icon-btn" onclick="confirmarZerar()" aria-label="Zerar">↻</button>
            </header>

            <main class="fodinha-grid" id="fodinha-game-grid"></main>
        </section>

        <section id="history-screen" class="screen hidden">
            <header class="top-bar">
                <button type="button" class="icon-btn" onclick="fecharHistorico()" aria-label="Voltar">‹</button>
                <div class="match-status">
                    <span>Partidas</span>
                    <strong>Histórico</strong>
                </div>
                <button type="button" class="icon-btn danger" onclick="limparHistorico()" aria-label="Limpar histórico">⌫</button>
            </header>

            <main class="history-list-container" id="history-list"></main>
        </section>
    </div>

    <div id="custom-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
            <h3 id="modal-title">Título</h3>
            <div id="modal-msg" class="modal-content">Mensagem</div>
            <div class="modal-actions">
                <button type="button" id="modal-btn-cancel" class="modal-btn secondary">Cancelar</button>
                <button type="button" id="modal-btn-confirm" class="modal-btn primary">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
